<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="100" height="200"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="100" y="0" width="100" height="200"/>
    </clipPath>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>
  </defs>
  <!-- Circle border -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#C0785C" stroke-width="2.5"/>
  <!-- Left half (dark) -->
  <g clip-path="url(#circle)">
    <rect x="0" y="0" width="100" height="200" fill="#5A5550"/>
    <!-- Right half (cream) -->
    <rect x="100" y="0" width="100" height="200" fill="#F5F0E8"/>
    <!-- Divider line -->
    <line x1="100" y1="12" x2="100" y2="188" stroke="#C0785C" stroke-width="1"/>
    <!-- Left rectangle (cream on dark) -->
    <rect x="68" y="92" width="20" height="14" rx="1.5" fill="#F5F0E8"/>
    <!-- Right rectangle (dark on cream) -->
    <rect x="112" y="92" width="20" height="14" rx="1.5" fill="#5A5550"/>
    <!-- Center circle -->
    <circle cx="100" cy="99" r="6" fill="none" stroke="#C0785C" stroke-width="2"/>
    <circle cx="100" cy="99" r="2.5" fill="#C0785C"/>
  </g>
</svg>
